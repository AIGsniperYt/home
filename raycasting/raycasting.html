<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raycasting Visualization</title>
    <style>
        body { margin: 0; }
        canvas { display: block; }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }
        label {
            display: block;
            margin: 10px 0;
            color: antiquewhite;
            font-weight: bold;
        }
        button {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <label>
            FOV: <input type="range" id="fovSlider" min="0.1" max="2" step="0.01" value="0.785">
        </label>
        <label>
            Number of Rays: <input type="range" id="raysSlider" min="1" max="360" step="1" value="100">
        </label>
        <button id="toggleRaysButton">Toggle Rays</button>
    </div>
    <script src="raycasting.js"></script>
</body>
</html>
