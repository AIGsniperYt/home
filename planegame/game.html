<!DOCTYPE html>
<html>
<head>
    <title>Plane Game</title>
    <link rel="stylesheet" type="text/css" href="game.css">
</head>
<body>
    
    <div id="wrapper1" class="wrapper">
      <img id="plane1" src="plane1.png" alt="plane1">
    </div>
    <div id="wrapper2" class="wrapper">
      <img id="plane2" src="plane2.png" alt="plane2">
    </div>
    
    <div class="bullet"></div>

    <!-- Health Bar for plane 1 -->
    <div id="healthBar1" class="healthBar">
      <div id="health1" class="health"></div>
      <div id="healthText1" class="healthText">Health: 200</div>
    </div>
  
    <!-- Health Bar for plane 2 -->
    <div id="healthBar2" class="healthBar">
      <div id="health2" class="health"></div>
      <div id="healthText2" class="healthText">Health: 200</div>
    </div>

    <script src="game.js"></script>
</body>
</html>
