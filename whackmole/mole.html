<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ccc; /* Set background color to gray */
        }

        .game-container {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 10px;
            text-align: center;
        }

        .hole {
            width: 100px;
            height: 100px;
            background-color: #634c4c;
            border: 2px solid #000;
            border-radius: 50%;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
        }

        .up {
            background-color: #000;
        }

        .score {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .time-remaining {
            font-size: 18px;
        }

        .info-container {
            text-align: center;
            margin-top: 20px; /* Add margin to push it to the top */
        }
    </style>
</head>
<body>
    <div class="info-container">
        <div class="score">Score: <span id="score">0</span></div>
        <div class="time-remaining">Time Remaining: <span id="time">10</span> seconds</div>
    </div>
    <div class="game-container">
        <div class="hole" onclick="bonk(this)"></div>
        <div class="hole" onclick="bonk(this)"></div>
        <div class="hole" onclick="bonk(this)"></div>
    </div>
    <script>
        let score = 0;
        let time = 10;
        let timeUp = false;

        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        function updateTime() {
            document.getElementById('time').textContent = time;
        }

        function randomHole() {
            const holes = document.querySelectorAll('.hole');
            const randomIndex = Math.floor(Math.random() * holes.length);
            return holes[randomIndex];
        }

        function peep() {
            const hole = randomHole();
            hole.classList.add('up');

            setTimeout(() => {
                hole.classList.remove('up');
                if (!timeUp) peep();
            }, 1000);
        }

        function bonk(hole) {
            if (hole.classList.contains('up')) {
                score++;
                hole.classList.remove('up');
                updateScore();
            }
        }

        function startGame() {
            score = 0;
            time = 10;
            timeUp = false;
            updateScore();
            updateTime();
            peep();

            const interval = setInterval(() => {
                if (time > 0) {
                    time--;
                    updateTime();
                } else {
                    timeUp = true;
                    clearInterval(interval);
                }
            }, 1000);
        }

        startGame();
    </script>
</body>
</html>
