<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A* Pathfinding Visualization</title>
    <style>
        body {
            font-family: 'Trebuchet MS', sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
        }
        .header {
            width: 100%;
            background-color: #1a252f;
            padding: 15px 0;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5);
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .controls button {
            background-color: #34495e;
            border: none;
            color: #ecf0f1;
            padding: 12px 20px;
            font-size: 1em;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        .controls button:hover {
            background-color: #2c3e50;
        }
        .controls button:active {
            transform: scale(0.97);
        }
        #message {
            padding: 12px;
            width: 100%;
            max-width: 750px;
            text-align: center;
            font-size: 1.2em;
            border-radius: 5px;
            background-color: #34495e;
            color: #ecf0f1;
            margin: 20px 0;
        }
        .canvas-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
        }

        

        canvas {
            border: 2px solid #ecf0f1;
            background-color: #1a252f;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.7);
        }
    </style>
    
    
</head>
<body>
    <div class="header">
        <div class="controls">
            <button id="resetGridBtn" onclick="initializeGrid()">Reset Grid</button>
            <button id="startAStarBtn" onclick="startAStar()">Start A*</button>
            <button id="showParentsBtn" onclick="toggleShowParents()">Show Parents</button>
            <button id="showFCostsBtn" onclick="toggleShowFCosts()">Show F Costs</button>
            <button id="tutorialModeBtn" onclick="tutorialMode()">Tutorial Mode</button>
            <button id="generateMazeBtn" onclick="generateMaze()">Generate Maze</button>            
            <button id="asmrBtn" onclick="toggleASMRMode()">Start ASMR Mode</button>
            <label for="delayInput">Set Delay (ms):</label>
            <input type="number" id="delayInput" value="500">  
        </div>
    </div>
     <div class="tile-menu">
        <button type="button" onclick='selectTile(TileState.EMPTY)'>Empty</button>
        <button type="button" onclick="selectTile(TileState.WALL)">Wall</button>
        <button type="button" onclick="selectTile(TileState.GRASS)">Grass</button>
        <button type="button" onclick="selectTile(TileState.WATER)">Water</button>
        <button type="button" onclick="selectTile(TileState.LAVA)">Lava</button>        
    </div> 
    <div id="message" class="info">Click a tile to set the start point.</div>
    <div class="canvas-container">
        <canvas id="gridCanvas" width="750" height="750"></canvas>
    </div>
    <script src="script.js"></script>
</body>
</html>
