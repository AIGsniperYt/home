<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simplex Noise Blending Demo</title>
    <style>
        canvas {
            border: 1px solid black;
        }
        .controls {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <canvas id="simplexCanvas" width="1000" height="1000"></canvas>
    <div class="controls">
        <label for="scale">Noise Scale:</label>
        <input type="range" id="scale" min="50" max="500" value="200">
        <button id="refreshButton">Refresh Noise</button>
    </div>
    <script>
        const canvas = document.getElementById('simplexCanvas');
        const context = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;

        const perm = [];
        for (let i = 0; i < 256; i++) {
            perm[i] = i;
        }
        for (let i = 0; i < 256; i++) {
            const j = Math.floor(Math.random() * 256);
            [perm[i], perm[j]] = [perm[j], perm[i]];
        }
        for (let i = 0; i < 256; i++) {
            perm[i + 256] = perm[i];
        }

        // Simplex noise function
        function grad(hash, x, y) {
            const h = hash & 3;
            const u = h < 2 ? x : y;
            const v = h < 2 ? y : x;
            return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
        }

        function fade(t) {
            return t * t * t * (t * (t * 6 - 15) + 10);
        }

        function lerp(t, a, b) {
            return a + t * (b - a);
        }

        function noise(x, y) {
            const X = Math.floor(x) & 255;
            const Y = Math.floor(y) & 255;

            x -= Math.floor(x);
            y -= Math.floor(y);

            const u = fade(x);
            const v = fade(y);

            const a = perm[X] + Y;
            const aa = perm[a];
            const ab = perm[a + 1];
            const b = perm[X + 1] + Y;
            const ba = perm[b];
            const bb = perm[b + 1];

            return lerp(v, lerp(u, grad(perm[aa], x, y), grad(perm[ba], x - 1, y)), lerp(u, grad(perm[ab], x, y - 1), grad(perm[bb], x - 1, y - 1)));
        }

        function drawBlendedNoise(scale) {
            const imageData = context.createImageData(width, height);
            for (let x = 0; x < width; x++) {
                for (let y = 0; y < height; y++) {
                    // Blend three noise layers
                    const layer1 = noise(x / (scale * 0.5), y / (scale * 0.5)) * 0.5; // Coarser noise
                    const layer2 = noise(x / scale, y / scale) * 0.75; // Medium noise
                    const layer3 = noise(x / (scale * 2), y / (scale * 2)); // Finer noise
                    const value = layer1 + layer2 + layer3; // Blend layers

                    const color = (value + 1) * 85; // Normalize value to [0, 255]
                    const index = (x + y * width) * 4;
                    imageData.data[index] = color;        // Red
                    imageData.data[index + 1] = color;    // Green
                    imageData.data[index + 2] = color;    // Blue
                    imageData.data[index + 3] = 255;      // Alpha
                }
            }
            context.putImageData(imageData, 0, 0);
        }

        // Initial draw
        const scaleInput = document.getElementById('scale');
        drawBlendedNoise(scaleInput.value);

        // Refresh button functionality
        document.getElementById('refreshButton').addEventListener('click', () => {
            drawBlendedNoise(scaleInput.value);
        });

        // Slider functionality
        scaleInput.addEventListener('input', () => {
            drawBlendedNoise(scaleInput.value);
        });
    </script>
</body>
</html>
