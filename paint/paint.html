<!DOCTYPE html>
<html>
<head>
    <title>Online Paint</title>
    <link rel="stylesheet" type="text/css" href="paint.css">
</head>
<body>
    <div class="toolbar">
        <button id="clear">Clear</button>
        <!-- Add dropdown button -->
        <div class="dropdown">
            <button class="dropbtn">Dock Position</button>
            <div class="dropdown-content">
                <button id="dockTop">Top</button>
                <button id="dockLeft">Left</button>
                <button id="dockBottom">Bottom</button>
                <button id="dockRight">Right</button>
            </div>
        <label for="colorPicker">Choose Color:</label>
        <input type="color" id="colorPicker" value="#000000">

        </div>
        <button id="black"></button>
        <button id="white"></button>
        <button id="blue"></button>
        <button id="green"></button>
        <button id="red"></button>
        <button id="orange"></button>
        <button id="brown"></button>
        <button id="pink"></button>
        <button id="yellow"></button>
        <label for="brushSize">Brush Size:</label>
        <input type="range" id="brushSize" min="1" max="100" value="10">
        <label for="backgroundColorPicker">Choose Background Color:</label>
        <input type="color" id="backgroundColorPicker" value="#ffffff">
        <button id="undo">Undo</button>
        <button id="redo">Redo</button>
        <button id="toggleMode">Toggle Mode</button>

    </div>
    <div class="canvas-container">
        <canvas id="canvas" width="800" height="600"></canvas>
    </div>
    <script src="paint.js"></script>
</body>
</html>
